services:
  db:
    image: mysql:8.0
    container_name: codetrip-db
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql        # DB 데이터 영속성
      - ./db/init:/docker-entrypoint-initdb.d  # 초기화 SQL 자동 실행
    networks:
      - codetrip-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codetrip-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    env_file:
      - .env
    volumes:
      - ./server/uploads:/app/uploads   # 업로드 파일 영속성
    depends_on:
      db:
        condition: service_healthy
    networks:
      - codetrip-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/travel/top-images"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s   # 캐시 초기화 대기

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_KAKAO_MAP_API_KEY: ${VITE_KAKAO_MAP_API_KEY}
    container_name: codetrip-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - codetrip-net

networks:
  codetrip-net:
    driver: bridge

volumes:
  mysql-data:   # Docker 관리 볼륨 (docker compose down -v 시 삭제됨)